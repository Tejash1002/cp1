# One-command, reproducible local run: MongoDB + Express API.
# The client runs via `npm run dev:client` (Vite) during development, or is
# built and served statically in production. Kept minimal for the MVP.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/faq_platform
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      CLIENT_ORIGIN: http://localhost:5173
      # AI_API_KEY intentionally empty → mock mode (no quota, no cost).
    ports:
      - '5000:5000'
    volumes:
      - uploads:/app/server/uploads

volumes:
  mongo_data:
  uploads:
